    black:   '0x282c34'
    red:     '0xff6c6b'
    green:   '0x98be65'
    yellow:  '0xecbe7b'
    blue:    '0x51afef'
    magenta: '0xc678dd'
    cyan:    '0x46d9ff'
    white:   '0xbbc2cf'
      
# Following color schmemes are currently available:
# nord-dark           breeze            tango		google-dark
# codeschool-dark     kasugano          doomicide	gslob-nature-suede
# muse                jwl-dark          nudge		dracula
# cyberpunk           solarized-dark	gruvbox		DoomOne
colors: *DoomOne

cursor:
  style:
    # Values for `shape`: ▇ Block; _ Underline; | Beam
    shape: Underline
    # Values for `blinking`:
    #   - Never: Prevent the cursor from ever blinking
    #   - Off: Disable blinking by default
    #   - On: Enable blinking by default
    #   - Always: Force the cursor to always blink
    blinking: Always

live_config_reload: true
